# Nginx Server Block Configuration
server {
    listen 80;
    server_name yourdomain.com; # Replace with your actual domain
    
    root /path/to/your/react/dist; # Replace with the actual path to your React app build directory
    index index.html;

    location / {
        # The critical catch-all directive
        # 1. Try to serve exact file path ($uri)
        # 2. Try to serve as a directory ($uri/)
        # 3. Fallback to index.html and pass all query parameters ($is_args$args)
        try_files $uri $uri/ /index.html$is_args$args;
    }

    # Optional: Cache static assets aggressively
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
        try_files $uri =404;
    }
}
